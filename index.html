<!DOCTYPE html>
<html>
  <head>
    <title>WeatherApp</title>
    <style>
      #pac-input {
        background-color: #fff;
        font-family: Roboto;
        font-size: 15px;
        font-weight: 300;
        margin: 12px;
        padding: 0 11px 0 13px;
        text-overflow: ellipsis;
        width: 400px;
        position: relative;
      }

      #pac-input:focus {
        border-color: #4d90fe;
      }

      table,
      th,
      td {
        border: 1px solid black;
        background-color: #fff;
      }
    </style>
  </head>
  <body style="overflow: hidden">
    <div id="map" style="height: 100%; width: 100%; position: absolute"></div>
    <input
      id="pac-input"
      class="controls"
      type="text"
      placeholder="Search Box"
    />
    <div style="right: 0; position: absolute">
      <table>
        <tr>
          <td>Condition</td>
          <td>Temp</td>
          <td>Feels Like</td>
          <td>Humidity</td>
          <td>Last Update</td>
        </tr>
        <tr>
          <td id="condi_text">null</td>
          <td id="temp">null</td>
          <td id="feelslike">null</td>
          <td id="humidity">null</td>
          <td id="lastupd">null</td>
        </tr>
      </table>
    </div>
  </body>
  <!-- jQuery script -->
  <script
    src="https://code.jquery.com/jquery-3.6.0.js"
    integrity="sha256-H+K7U5CnXl1h5ywQfKtSj8PCmoN9aaq30gDh27Xc0jk="
    crossorigin="anonymous"
  ></script>

  <!-- Map script -->
  <script>
    ((g) => {
      var h,
        a,
        k,
        p = "The Google Maps JavaScript API",
        c = "google",
        l = "importLibrary",
        q = "__ib__",
        m = document,
        b = window;
      b = b[c] || (b[c] = {});
      var d = b.maps || (b.maps = {}),
        r = new Set(),
        e = new URLSearchParams(),
        u = () =>
          h ||
          (h = new Promise(async (f, n) => {
            await (a = m.createElement("script"));
            e.set("libraries", [...r] + "");
            for (k in g)
              e.set(
                k.replace(/[A-Z]/g, (t) => "_" + t[0].toLowerCase()),
                g[k]
              );
            e.set("callback", c + ".maps." + q);
            a.src = `https://maps.${c}apis.com/maps/api/js?` + e;
            d[q] = f;
            a.onerror = () => (h = n(Error(p + " could not load.")));
            a.nonce = m.querySelector("script[nonce]")?.nonce || "";
            m.head.append(a);
          }));
      d[l]
        ? console.warn(p + " only loads once. Ignoring:", g)
        : (d[l] = (f, ...n) => r.add(f) && u().then(() => d[l](f, ...n)));
    })({
      key: "AIzaSyChqd7SEgoo_Dkf1KJjcUjMMZuGA36ClDg",
      v: "weekly",
      libraries: "places",
      // Use the 'v' parameter to indicate the version to use (weekly, beta, alpha, etc.).
      // Add other bootstrap parameters as needed, using camel case.
    });

    let map;

    async function initMap() {
      const myLatlng = { lat: 1.371254, lng: 103.816539 };
      const { Map } = await google.maps.importLibrary("maps");

      map = new Map(document.getElementById("map"), {
        center: { lat: 1.371254, lng: 103.816539 },
        zoom: 13,
        disableDefaultUI: true,
      });

      const input = document.getElementById("pac-input");
      const searchBox = new google.maps.places.SearchBox(input);

      map.controls[google.maps.ControlPosition.TOP_LEFT].push(input);
      // Bias the SearchBox results towards current map's viewport.
      map.addListener("bounds_changed", () => {
        searchBox.setBounds(map.getBounds());
      });

      let markers = [];

      // Listen for the event fired when the user selects a prediction and retrieve
      // more details for that place.
      searchBox.addListener("places_changed", () => {
        const places = searchBox.getPlaces();

        if (places.length == 0) {
          return;
        }

        // Clear out the old markers.
        markers.forEach((marker) => {
          marker.setMap(null);
        });
        markers = [];

        // For each place, get the icon, name and location.
        const bounds = new google.maps.LatLngBounds();

        places.forEach((place) => {
          if (!place.geometry || !place.geometry.location) {
            console.log("Returned place contains no geometry");
            return;
          }

          var avgLng =
            (place.geometry.viewport.Ia.hi + place.geometry.viewport.Ia.lo) / 2;
          var avgLat =
            (place.geometry.viewport.Va.hi + place.geometry.viewport.Va.lo) / 2;

          console.log(avgLng, avgLat);
          marker.setMap(null);
          marker = new google.maps.Marker({
            position: { lat: avgLat, lng: avgLng },
            map,
          });
          getCurrentWeather(avgLat, avgLng);
          if (place.geometry.viewport) {
            // Only geocodes have viewport.
            bounds.union(place.geometry.viewport);
          } else {
            bounds.extend(place.geometry.location);
          }
        });
        map.fitBounds(bounds);
      });

      var marker = new google.maps.Marker({
        position: myLatlng,
      });

      // To add the marker to the map, call setMap();
      // marker.setMap(map);

      map.addListener("click", (mapsMouseEvent) => {
        marker.setMap(null);
        console.log(mapsMouseEvent.latLng.toJSON());
        var latCoord = mapsMouseEvent.latLng.toJSON().lat;
        var lngCoord = mapsMouseEvent.latLng.toJSON().lng;
        // console.log(latCoord, lngCoord);
        getCurrentWeather(latCoord, lngCoord);
        marker = new google.maps.Marker({
          position: mapsMouseEvent.latLng,
          map,
        });
      });
    }

    initMap();

    window.initMap = initMap;
  </script>
  <script>
    function getCurrentWeather(lat, lng) {
      var temp_c, feelslike_c, humidity, last_update, result;
      let request = new XMLHttpsRequest();
      var linkUse =
        "https://api.weatherapi.com/v1/current.json?key=3db52d950971472cb9174854231808&q=" +
        lat +
        "," +
        lng +
        "&aqi=yes";
      request.open("GET", linkUse);
      request.send();
      request.onload = () => {
        console.log(request);
        if (request.status === 200) {
          result = JSON.parse(request.response);
          console.log(result.current.condition.text);
          console.log(result);
          // return {
          //   temp_c: result.current.temp_c,
          //   feelslike_c: result.current.feelslike_c,
          //   humidity: result.current.humidity,
          //   last_update: result.current.last_updated,
          // };
          setValsIntoTable(
            result.current.temp_c,
            result.current.feelslike_c,
            result.current.humidity,
            result.current.last_updated,
            result.current.condition.text
          );
        } else console.log("error ${request.status} ${request.statusText}");
      };
    }

    function setValsIntoTable(
      temp_c,
      feelslike_c,
      humidity,
      lastupdate,
      condi_text
    ) {
      console.log(temp_c);
      console.log(feelslike_c);
      console.log(humidity);
      console.log(lastupdate);
      document.getElementById("temp").innerHTML = temp_c + "°C";
      document.getElementById("feelslike").innerHTML = feelslike_c + "°C";
      document.getElementById("humidity").innerHTML = humidity + "%";
      document.getElementById("lastupd").innerHTML = lastupdate;
      document.getElementById("condi_text").innerHTML = condi_text;
    }
  </script>
</html>
